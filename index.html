<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Schach Web-App mit KI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Verhindert das Scrollen der gesamten Seite */
        }

        h1 {
            margin: 5px 0;
            color: #f0d9b5;
            font-size: 1.8rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        #board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            /* Verhindert das Touch-Scrollen/Gesten beim Bewegen der Figuren auf Mobilgeräten */
            touch-action: none; 
        }

        .info-panel {
            text-align: center;
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            width: 85%;
            box-sizing: border-box;
        }

        .status {
            font-size: 1.1rem;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        select, button {
            background-color: #b58863;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        select {
            background-color: #404040;
            flex-grow: 1;
            outline: none;
        }

        button:hover {
            background-color: #f0d9b5;
            color: #1e1e1e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Schach Pro</h1>
        
        <div id="board"></div>

        <div class="info-panel">
            <div id="status" class="status">Weiß ist am Zug.</div>
            <div class="controls">
                <div class="row">
                    <label for="modeSelect">Gegner:</label>
                    <select id="modeSelect">
                        <option value="local">Lokal (2 Spieler)</option>
                        <option value="ai" selected>KI (Stockfish)</option>
                    </select>
                </div>
                <div class="row" id="difficultyRow">
                    <label for="depthSelect">Stufe:</label>
                    <select id="depthSelect">
                        <option value="1">1 - Anfänger</option>
                        <option value="3" selected>2 - Leicht</option>
                        <option value="5">3 - Normal</option>
                        <option value="10">4 - Schwer</option>
                        <option value="15">5 - Meister</option>
                    </select>
                </div>
                <button id="restartBtn">Neues Spiel</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let stockfish = null;

        const $status = $('#status');
        const $modeSelect = $('#modeSelect');
        const $depthSelect = $('#depthSelect');
        const $difficultyRow = $('#difficultyRow');

        // Stockfish Web Worker initialisieren
        function initStockfish() {
            if (stockfish) stockfish.terminate();
            // Nutzen der offiziellen Stockfish.js Distribution via CDN
            stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
            
            stockfish.onmessage = function(event) {
                const line = event.data;
                // Wenn Stockfish den besten Zug berechnet hat
                if (line.startsWith('bestmove')) {
                    const move = line.split(' ')[1];
                    makeAIMove(move);
                }
            };
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;

            // Spieler ist immer Weiß im KI-Modus
            if ($modeSelect.val() === 'ai' && game.turn() === 'b') return false;

            // Nur die richtige Farbe ziehen lassen
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';

            updateStatus();

            // Wenn KI-Modus aktiv und Schwarz dran ist, Engine triggern
            if ($modeSelect.val() === 'ai' && !game.game_over() && game.turn() === 'b') {
                window.setTimeout(prepareAIMove, 250);
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function prepareAIMove() {
            const depth = $depthSelect.val();
            // Aktuelle Position im FEN-Format an Stockfish senden
            stockfish.postMessage('position fen ' + game.fen());
            // Suche mit vordefinierter Tiefe starten
            stockfish.postMessage('go depth ' + depth);
        }

        function makeAIMove(sanMove) {
            // Zug konvertieren (z.B. e2e4 -> von e2 nach e4)
            const from = sanMove.substring(0, 2);
            const to = sanMove.substring(2, 4);
            const promotion = sanMove.length > 4 ? sanMove.charAt(4) : undefined;

            game.move({ from: from, to: to, promotion: promotion });
            board.position(game.fen());
            updateStatus();
        }

        function updateStatus() {
            let status = '';
            let moveColor = (game.turn() === 'w') ? 'Weiß' : 'Schwarz';

            if (game.in_checkmate()) {
                status = `Spiel vorbei! ${moveColor} ist im Schachmatt.`;
            } else if (game.in_draw()) {
                status = 'Spiel vorbei! Unentschieden.';
            } else {
                status = `${moveColor} ist am Zug.`;
                if (game.in_check()) {
                    status += ` (${moveColor} steht im Schach!)`;
                }
            }
            $status.html(status);
        }

        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = Chessboard('board', config);
        initStockfish();
        updateStatus();

        // UI Event Listener
        $modeSelect.on('change', function() {
            if ($(this).val() === 'ai') {
                $difficultyRow.show();
            } else {
                $difficultyRow.hide();
            }
            resetGame();
        });

        $('#restartBtn').on('click', resetGame);

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
            if ($modeSelect.val() === 'ai') {
                initStockfish();
            }
        }
    </script>
</body>
</html>
