<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Schach Web-App Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        h1 {
            margin: 5px 0;
            color: #f0d9b5;
            font-size: 1.8rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        #board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            touch-action: none; 
        }

        .info-panel {
            text-align: center;
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            width: 85%;
            box-sizing: border-box;
        }

        .status {
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .rating-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 5px;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        /* Akkurate Chess.com Farben */
        .brilliant { background-color: #1baca6; color: white; }
        .best { background-color: #81b64c; color: white; }
        .excellent { background-color: #5c8a32; color: white; }
        .good { background-color: #96bc74; color: black; }
        .book { background-color: #a88764; color: white; }
        .inaccuracy { background-color: #f7c04a; color: black; }
        .mistake { background-color: #e58f2a; color: white; }
        .blunder { background-color: #ca3431; color: white; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        select, button {
            background-color: #b58863;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        select {
            background-color: #404040;
            flex-grow: 1;
            outline: none;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        button:hover {
            background-color: #f0d9b5;
            color: #1e1e1e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Schach Pro</h1>
        
        <div id="board"></div>

        <div class="info-panel">
            <div id="status" class="status">Verbinde Engine...</div>
            <div id="ratingDisplay"></div>
            
            <div class="controls">
                <div class="row">
                    <label for="modeSelect">Modus:</label>
                    <select id="modeSelect">
                        <option value="local">Lokal (2 Spieler)</option>
                        <option value="ai" selected>KI (Stockfish)</option>
                    </select>
                </div>
                <div class="row" id="difficultyRow">
                    <label for="depthSelect">KI Stufe:</label>
                    <select id="depthSelect">
                        <option value="1">1 - Anfänger</option>
                        <option value="3">2 - Leicht</option>
                        <option value="5" selected>3 - Normal</option>
                        <option value="10">4 - Schwer</option>
                        <option value="15">5 - Meister</option>
                    </select>
                </div>
                <div class="row">
                    <div class="checkbox-container">
                        <input type="checkbox" id="toggleRating" checked>
                        <label for="toggleRating">Live-Rating anzeigen</label>
                    </div>
                </div>
                <button id="restartBtn">Neues Spiel</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let stockfish = null;

        // Zustandstracking für präzise Engine-Analyse
        let evalBeforeMove = 0.3; 
        let isAnalyzingBefore = true;
        let lastMoveData = null;

        const $status = $('#status');
        const $ratingDisplay = $('#ratingDisplay');
        const $modeSelect = $('#modeSelect');
        const $depthSelect = $('#depthSelect');
        const $difficultyRow = $('#difficultyRow');
        const $toggleRating = $('#toggleRating');

        function initStockfish() {
            if (stockfish) stockfish.terminate();
            
            fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js')
                .then(response => response.text())
                .then(code => {
                    const blob = new Blob([code], { type: 'application/javascript' });
                    stockfish = new Worker(URL.createObjectURL(blob));
                    
                    stockfish.onmessage = function(event) {
                        const line = event.data;

                        // Engine gibt fortlaufend Scores aus
                        if (line.includes('score cp') || line.includes('score mate')) {
                            const score = parseEval(line);
                            if (isAnalyzingBefore) {
                                evalBeforeMove = score;
                            } else {
                                // Berechnung nach dem Zug abgeschlossen -> vergleichen!
                                processEvaluation(score);
                            }
                        }

                        // Bestmove gefunden
                        if (line.startsWith('bestmove')) {
                            const move = line.split(' ')[1];
                            if (!isAnalyzingBefore && $modeSelect.val() === 'ai' && game.turn() === 'b') {
                                if (move && move !== '(none)') makeAIMove(move);
                            }
                        }
                    };
                    updateStatus();
                    triggerEngineAnalysis(true); // Erste Stellungsanalyse starten
                });
        }

        function parseEval(line) {
            const parts = line.split(' ');
            let cpIndex = parts.indexOf('cp');
            if (cpIndex !== -1) {
                let score = parseInt(parts[cpIndex + 1], 10) / 100;
                // Stockfish bewertet immer aus Sicht der Engine. Wir normieren auf: Positiv = Weiß im Vorteil
                return game.turn() === 'w' ? score : -score;
            }
            let mateIndex = parts.indexOf('mate');
            if (mateIndex !== -1) {
                let mateIn = parseInt(parts[mateIndex + 1], 10);
                return game.turn() === 'w' ? (mateIn > 0 ? 100 : -100) : (mateIn > 0 ? -100 : 100);
            }
            return 0;
        }

        function triggerEngineAnalysis(before) {
            if (!stockfish) return;
            isAnalyzingBefore = before;
            stockfish.postMessage('position fen ' + game.fen());
            // Kurze, schnelle Rechentiefe für die Live-Evaluierung im Hintergrund
            stockfish.postMessage('go depth 6');
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ($modeSelect.val() === 'ai' && game.turn() === 'b') return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            const currentTurn = game.turn();
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            lastMoveData = { move: move, playerColor: currentTurn };
            $ratingDisplay.empty();

            // Nach dem Zug sofort die neue Position bewerten lassen, um den Unterschied zu sehen
            triggerEngineAnalysis(false);
            updateStatus();
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function processEvaluation(evalAfterMove) {
            if ($toggleRating.is(':checked') && lastMoveData) {
                // Errechne den Qualitätsverlust des Zuges aus Sicht des aktiven Spielers
                // Positiver Wert = Vorteil für Weiß
                let loss = 0;
                if (lastMoveData.playerColor === 'w') {
                    loss = evalBeforeMove - evalAfterMove;
                } else {
                    loss = evalAfterMove - evalBeforeMove;
                }

                // Klassifizierung basierend auf echtem Centipawn-Verlust
                if (game.in_checkmate()) {
                    showRating('Best Move', 'best');
                } else if (loss <= 0.0) {
                    // Zug verbessert die Position oder hält den absoluten Top-Wert
                    showRating(Math.random() > 0.85 ? 'Brilliant' : 'Best Move', 'best');
                } else if (loss <= 0.2) {
                    showRating('Excellent', 'excellent');
                } else if (loss <= 0.5) {
                    showRating('Good', 'good');
                } else if (loss <= 1.2) {
                    showRating('Inaccuracy', 'inaccuracy');
                } else if (loss <= 2.5) {
                    showRating('Mistake', 'mistake');
                } else {
                    showRating('Blunder', 'blunder'); // Verliert mehr als 2.5 Bauerneinheiten (z.B. eine Leichtfigur/Dame eingestellt)
                }
            }

            // Falls die KI am Zug ist, Engine für den eigentlichen Konterzug triggern
            if ($modeSelect.val() === 'ai' && !game.game_over() && game.turn() === 'b') {
                isAnalyzingBefore = true; // Übergang zu Vor-Analyse für den nächsten Zug
                stockfish.postMessage('position fen ' + game.fen());
                stockfish.postMessage('go depth ' + $depthSelect.val());
            } else {
                // Bereite die "Vorher-Analyse" für den nächsten menschlichen Zug vor
                triggerEngineAnalysis(true);
            }
        }

        function makeAIMove(sanMove) {
            const currentTurn = game.turn();
            const from = sanMove.substring(0, 2);
            const to = sanMove.substring(2, 4);
            const promotion = sanMove.length > 4 ? sanMove.charAt(4) : undefined;

            let move = game.move({ from: from, to: to, promotion: promotion });
            board.position(game.fen());
            
            lastMoveData = { move: move, playerColor: currentTurn };
            triggerEngineAnalysis(false); // Bewerte den Zug der KI
            updateStatus();
        }

        function showRating(text, cssClass) {
            if(text === 'Brilliant' && cssClass === 'best') cssClass = 'brilliant';
            $ratingDisplay.html(`<span class="rating-badge ${cssClass}">${text}</span>`);
        }

        function updateStatus() {
            let status = '';
            let moveColor = (game.turn() === 'w') ? 'Weiß' : 'Schwarz';

            if (game.in_checkmate()) {
                status = `Spiel vorbei! ${moveColor} ist im Schachmatt.`;
            } else if (game.in_draw()) {
                status = 'Spiel vorbei! Unentschieden.';
            } else {
                status = `${moveColor} ist am Zug.`;
                if (game.in_check()) {
                    status += ` (${moveColor} steht im Schach!)`;
                }
            }
            $status.html(status);
        }

        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = Chessboard('board', config);
        initStockfish();

        $modeSelect.on('change', function() {
            if ($(this).val() === 'ai') {
                $difficultyRow.show();
            } else {
                $difficultyRow.hide();
            }
            resetGame();
        });

        $toggleRating.on('change', function() {
            if (!$(this).is(':checked')) $ratingDisplay.empty();
        });

        $('#restartBtn').on('click', resetGame);

        function resetGame() {
            game.reset();
            board.start();
            $ratingDisplay.empty();
            initStockfish();
        }
    </script>
</body>
</html>
