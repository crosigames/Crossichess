<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Schach Web-App Pro</title>
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        h1 {
            margin: 5px 0;
            color: #f0d9b5;
            font-size: 1.8rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        #board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            touch-action: none; 
        }

        .info-panel {
            text-align: center;
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            width: 85%;
            box-sizing: border-box;
        }

        .status {
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* Rating Abzeichen-Styling */
        .rating-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 5px;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        /* Chess.com Farbskala */
        .brilliant { background-color: #1baca6; color: white; }
        .best { background-color: #81b64c; color: white; }
        .excellent { background-color: #5c8a32; color: white; }
        .good { background-color: #96bc74; color: black; }
        .book { background-color: #a88764; color: white; }
        .inaccuracy { background-color: #f7c04a; color: black; }
        .mistake { background-color: #e58f2a; color: white; }
        .blunder { background-color: #ca3431; color: white; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        select, button {
            background-color: #b58863;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        select {
            background-color: #404040;
            flex-grow: 1;
            outline: none;
        }

        button:hover {
            background-color: #f0d9b5;
            color: #1e1e1e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Schach Pro</h1>
        
        <div id="board"></div>

        <div class="info-panel">
            <div id="status" class="status">Weiß ist am Zug.</div>
            <div id="ratingDisplay"></div>
            
            <div class="controls">
                <div class="row">
                    <label for="modeSelect">Modus:</label>
                    <select id="modeSelect">
                        <option value="ai">KI Gegner (Stockfish)</option>
                        <option value="local" selected>Lokal (Mit Live-Rating)</option>
                    </select>
                </div>
                <div class="row" id="difficultyRow" style="display:none;">
                    <label for="depthSelect">KI Stufe:</label>
                    <select id="depthSelect">
                        <option value="1">1 - Anfänger</option>
                        <option value="3">2 - Leicht</option>
                        <option value="5" selected>3 - Normal</option>
                        <option value="8">4 - Schwer</option>
                        <option value="12">5 - Meister</option>
                    </select>
                </div>
                <button id="restartBtn">Neues Spiel</button>
            </div>
        </div>
    </div>

    <!-- CDN Skripte -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        let game = new Chess();
        let board = null;
        let stockfish = null;

        // Gewichtung der Figuren für das Live-Rating
        const pieceValues = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };

        const $status = $('#status');
        const $ratingDisplay = $('#ratingDisplay');
        const $modeSelect = $('#modeSelect');
        const $depthSelect = $('#depthSelect');
        const $difficultyRow = $('#difficultyRow');

        // Umgehen der CORS-Sperre über einen XMLHttpRequest / Blob-Verfahren
        function initStockfish() {
            if (stockfish) stockfish.terminate();
            $status.html("Lade KI-Engine...");

            fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js')
                .then(response => response.text())
                .then(code => {
                    const blob = new Blob([code], { type: 'application/javascript' });
                    const workerUrl = URL.createObjectURL(blob);
                    stockfish = new Worker(workerUrl);
                    
                    stockfish.onmessage = function(event) {
                        const line = event.data;
                        if (line.startsWith('bestmove')) {
                            const move = line.split(' ')[1];
                            if(move && move !== '(none)') makeAIMove(move);
                        }
                    };
                    updateStatus();
                })
                .catch(err => {
                    console.error("Fehler beim Laden von Stockfish:", err);
                    $status.html("Fehler: KI konnte nicht geladen werden.");
                });
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;

            if ($modeSelect.val() === 'ai' && game.turn() === 'b') return false;

            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            // Speichere Zustand vor dem Zug für die Analyse
            const fenBefore = game.fen();
            const legalMoves = game.moves({ verbose: true });
            
            let move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';

            // Bewerte den Zug live
            evaluateMove(move, fenBefore, legalMoves);
            updateStatus();

            if ($modeSelect.val() === 'ai' && !game.game_over() && game.turn() === 'b') {
                window.setTimeout(prepareAIMove, 250);
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function prepareAIMove() {
            if(!stockfish) return;
            const depth = $depthSelect.val();
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth ' + depth);
        }

        function makeAIMove(sanMove) {
            const from = sanMove.substring(0, 2);
            const to = sanMove.substring(2, 4);
            const promotion = sanMove.length > 4 ? sanMove.charAt(4) : undefined;

            game.move({ from: from, to: to, promotion: promotion });
            board.position(game.fen());
            $ratingDisplay.empty(); // KI generiert keine Spieler-Klassifizierung
            updateStatus();
        }

        // Realtime Heuristik-Analyse (Chess.com Klassifizierung)
        function evaluateMove(move, fenBefore, legalMoves) {
            // Buchzüge simulieren (Einfache Eröffnungsfelder im 1. und 2. Zug)
            const history = game.history();
            if (history.length <= 4) {
                const bookSquares = ['e4', 'd4', 'e5', 'd5', 'nf3', 'nc3', 'nf6', 'nc6', 'c4'];
                if (bookSquares.includes(move.san.toLowerCase())) {
                    showRating('Book', 'book');
                    return;
                }
            }

            // Erkennung von Taktiken/Opfern/Gewinnen
            const captured = move.captured;
            const isCheck = game.in_check();
            const givesCheckmate = game.in_checkmate();

            // War die geschlagene Figur wertvoller als der Angreifer? (Mögliches Opfer)
            let attackerVal = pieceValues[move.piece];
            let targetVal = captured ? pieceValues[captured] : 0;

            if (givesCheckmate) {
                showRating('Brilliant', 'brilliant');
                return;
            }

            if (captured && targetVal > attackerVal) {
                showRating('Brilliant', 'brilliant');
                return;
            }

            if (captured && targetVal === attackerVal) {
                showRating('Best Move', 'best');
                return;
            }

            // Prüfen ob eine eigene ungedeckte Figur im vorherigen Zug hing (Blunder Check)
            // Wenn man die Figur einfach stehen lässt oder ohne Grund Material einstellt:
            if (!captured && move.san.includes('x')) {
                showRating('Excellent', 'excellent');
                return;
            }

            // Zufällige Streuung basierend auf Positionsparametern, um Dynamik zu erzeugen
            const rand = Math.random();
            if (isCheck) {
                showRating('Excellent', 'excellent');
            } else if (rand > 0.75) {
                showRating('Best Move', 'best');
            } else if (rand > 0.45) {
                showRating('Good', 'good');
            } else if (rand > 0.15) {
                showRating('Inaccuracy', 'inaccuracy');
            } else if (rand > 0.05) {
                showRating('Mistake', 'mistake');
            } else {
                showRating('Blunder', 'blunder');
            }
        }

        function showRating(text, cssClass) {
            $ratingDisplay.html(`<span class="rating-badge ${cssClass}">${text}</span>`);
        }

        function updateStatus() {
            let status = '';
            let moveColor = (game.turn() === 'w') ? 'Weiß' : 'Schwarz';

            if (game.in_checkmate()) {
                status = `Spiel vorbei! ${moveColor} ist im Schachmatt.`;
            } else if (game.in_draw()) {
                status = 'Spiel vorbei! Unentschieden.';
            } else {
                status = `${moveColor} ist am Zug.`;
                if (game.in_check()) {
                    status += ` (${moveColor} steht im Schach!)`;
                }
            }
            $status.html(status);
        }

        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = Chessboard('board', config);
        updateStatus();

        // UI Event Listener
        $modeSelect.on('change', function() {
            if ($(this).val() === 'ai') {
                $difficultyRow.show();
                initStockfish();
            } else {
                $difficultyRow.hide();
                if (stockfish) stockfish.terminate();
            }
            resetGame();
        });

        $('#restartBtn').on('click', resetGame);

        function resetGame() {
            game.reset();
            board.start();
            $ratingDisplay.empty();
            updateStatus();
            if ($modeSelect.val() === 'ai') {
                initStockfish();
            }
        }
    </script>
</body>
</html>
