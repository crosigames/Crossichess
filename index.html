<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Next - Authenticate</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-surface: #1e1e1e;
            --primary: #81b64c;
            --primary-hover: #a3d96c;
            --text-main: #ffffff;
            --text-muted: #bababa;
            --border: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            background-color: var(--bg-surface);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .logo-area {
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-google:hover {
            background-color: #f1f1f1;
        }

        .btn-google:active {
            transform: scale(0.98);
        }

        .btn-google svg {
            width: 20px;
            height: 20px;
        }

        .error-message {
            color: #ff4a4a;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
            background: rgba(255, 74, 74, 0.1);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 74, 74, 0.2);
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid var(--text-muted);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-area">
            <div class="logo-icon">♞</div>
            <h1>Chess Next</h1>
            <p>The next generation chess platform.</p>
        </div>

        <button id="google-login-btn" class="btn-google">
            <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </button>

        <div id="auth-loader" class="loader"></div>
        <div id="error-box" class="error-message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFOE6l-jR90YJBVwWqEF5d22UQ6S13dBQ",
            authDomain: "crossichess.firebaseapp.com",
            projectId: "crossichess",
            storageBucket: "crossichess.firebasestorage.app",
            messagingSenderId: "86230015962",
            appId: "1:86230015962:web:e499c0c0a757ff0eea6ae3",
            measurementId: "G-EGBDX8R4W7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('google-login-btn');
        const loader = document.getElementById('auth-loader');
        const errorBox = document.getElementById('error-box');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "menu.html"; 
            }
        });

        loginBtn.addEventListener('click', async () => {
            errorBox.style.display = 'none';
            loginBtn.style.display = 'none';
            loader.style.display = 'block';

            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Authentication Error:", error);
                loader.style.display = 'none';
                loginBtn.style.display = 'flex';
                
                errorBox.textContent = "Login failed: " + error.message;
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
